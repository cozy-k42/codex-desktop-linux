name: Flatpak Bundle

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/flatpak.yml
      - Makefile
      - install.sh
      - launcher/**
      - packaging/flatpak/**
      - linux-features/**
      - scripts/build-flatpak.sh
      - scripts/flatpak/**
      - scripts/lib/**
      - scripts/patch-linux-window-ui.js
      - scripts/patches/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/flatpak.yml
      - Makefile
      - install.sh
      - launcher/**
      - packaging/flatpak/**
      - linux-features/**
      - scripts/build-flatpak.sh
      - scripts/flatpak/**
      - scripts/lib/**
      - scripts/patch-linux-window-ui.js
      - scripts/patches/**

jobs:
  flatpak:
    name: Build Flatpak Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Flatpak tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder appstream
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak builder state
        uses: actions/cache@v6
        with:
          path: |
            .flatpak-builder
            ~/.local/share/flatpak
          key: flatpak-${{ runner.os }}-${{ hashFiles('packaging/flatpak/upstream.json', 'packaging/flatpak/*-sources.json', 'packaging/flatpak/**/package-lock.json') }}
          restore-keys: |
            flatpak-${{ runner.os }}-

      - name: Check Flatpak pins
        run: |
          printf '{"enabled":["authenticated-proxy"]}\n' > linux-features/features.example.json
          make flatpak-check

      - name: Build Flatpak bundle
        run: |
          make flatpak

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v7
        with:
          name: codex-desktop-linux-flatpak
          path: dist/*.flatpak
          if-no-files-found: error
          retention-days: 14
